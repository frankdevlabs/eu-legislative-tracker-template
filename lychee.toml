# Link-checker config. Internal relative links (incl. the committed PDFs) are checked normally.
# External hosts that bot-block or that we cite by number rather than assert as live are excluded.
accept = [200, 202, 206, 403, 429]
max_retries = 3
retry_wait_time = 2
timeout = 30
# Placeholder templates carry <PLACEHOLDER> link destinations, not real links — don't scan them.
exclude_path = ["STATUS.template.md"]
exclude = [
  "^https://data\\.consilium\\.europa\\.eu",   # register 404s for unreleased LIMITE docs (cited by number)
  "^https://eur-lex\\.europa\\.eu",            # returns 202 to automated clients
  "^https://oeil\\.europarl\\.europa\\.eu",    # bot-sensitive
  "^https://www\\.linkedin\\.com",             # blocks automated access
  "^https://aichamber\\.eu",                   # PDF host times out for automated clients (stakeholder open letter)
  "^https://netzpolitik\\.org/wp-upload/",     # LIMITE mirror PDFs; slow/bot-blocking (cited copies, not asserted live)
  "^https://zoek\\.officielebekendmakingen\\.nl",  # Dutch Kamervragen RSS query URLs (watchlist feeds, not asserted live)
]
