# Document register — the SINGLE source of truth for every official document on the file.
# sources/README.md is its *rendered* table (edit this YAML, then mirror the table; never the table alone).
#
# TEMPLATE NOTE: the rows below are EXAMPLE entries from the reference file 2025/0360 (COD),
# kept to show the schema and every field in use. Replace them with your file's documents
# (use the `register-document` skill — it appends here and renders sources/README.md).
#
# Field reference:
#   id            stable institutional id (COM-…, ST-…, WK-…, CM-…, OEIL-…, EDPB-EDPS-…, ECB-…, EESC-…)
#   title         quoted descriptive title
#   body          institution: Commission | Council | Parliament | EDPB-EDPS | ECB | EESC | <Member State> | …
#   date          ISO YYYY-MM-DD
#   limite        bool — true for Council LIMITE documents
#   url           authoritative URL (also: celex)
#   mirror        public copy when the authoritative URL is restricted (LIMITE)
#   register      Council register reference
#   national_parliament  national-parliament record hosting a LIMITE text
#   local / local_cover / local_annex / local_init / local_add1…  committed file path(s)
#   access        omit = fully public; else cite-only | screenshot-only | not-public |
#                 public-released | public-via-register | public-via-journalist | public-via-national-parliament
#   lead_source   credit for a Tier-2/3/external lead that surfaced the doc (name+handle, watchlist
#                 code, tip URL+date) — set when a register run was triggered by a tip, not a Tier-1 feed
#   leading_service / mandatory_consultees / notes   prose context (notes is a `>-` block)

